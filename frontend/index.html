<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S.T.A.R.L.I.N.G. — Local AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="starling" id="starling">

    <!-- Decorative background -->
    <div class="grid-bg"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- Header -->
    <header class="hdr">
      <div class="hdr-title">
        <div class="hdr-system">LOCAL AI SYSTEM v1.0</div>
        <div class="hdr-name">S.T.A.R.L.I.N.G.</div>
        <div class="hdr-fullname">Speech&#8209;Triggered Autonomous Reasoning &amp; Local Intelligence Node Generator</div>
      </div>
      <div class="hdr-stats">
        <div class="stat">
          <div class="stat-lbl">GPU</div>
          <div class="stat-val" id="stat-gpu">RTX 4060</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">MODEL</div>
          <div class="stat-val" id="stat-model">—</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">STATUS</div>
          <div class="stat-val" id="stat-status">INIT</div>
        </div>
      </div>
    </header>

    <!-- Two-column body -->
    <div class="body-cols">

      <!-- Left column: sphere + waveform, vertically centred -->
      <div class="col-left">
        <div class="ring-section">
          <div class="ring-wrap">
            <div class="sphere-halo" id="sphere-halo"></div>
            <canvas id="sphere-canvas" aria-hidden="true"></canvas>
          </div>
          <div class="waveform" id="waveform" aria-hidden="true"></div>
        </div>
      </div>

      <!-- Right column: conversation -->
      <div class="col-right">
        <div class="chat-panel">
          <div class="chat-inner" id="chat-inner"></div>
        </div>
      </div>

    </div><!-- /body-cols -->

    <!-- Full-width bottom bar: LLM metrics + TTS settings + controls -->
    <div class="bottom-bar">
      <!-- LLM performance + context metrics (single row, populated after each response) -->
      <div class="llm-metrics" id="llm-metrics">
        <span class="lm-item"><span class="lm-lbl">PROMPT</span><span class="lm-val" id="lm-prompt">—</span></span>
        <span class="lm-sep">·</span>
        <span class="lm-item"><span class="lm-lbl">GEN</span><span class="lm-val" id="lm-gen">—</span></span>
        <span class="lm-sep">·</span>
        <span class="lm-item"><span class="lm-lbl">TIME</span><span class="lm-val" id="lm-time">—</span></span>
        <span class="lm-sep">·</span>
        <span class="lm-lbl">CTX</span>
        <span class="lm-val" id="lm-ctx">—</span>
        <div class="lm-ctx-track"><div class="lm-ctx-fill" id="lm-ctx-fill"></div></div>
        <span class="lm-val lm-ctx-pct" id="lm-ctx-pct"></span>
      </div>
      <div class="tts-bar" id="tts-bar">
        <button class="tts-toggle" id="tts-toggle" title="Toggle text-to-speech">TTS ON</button>
        <select class="voice-select" id="voice-select" title="Kokoro voice">
          <option value="bm_george">George (GB ♂)</option>
        </select>
        <div class="tts-engine" id="tts-engine">KOKORO</div>
      </div>
      <div class="controls">
        <button class="mic-btn" id="mic-btn" title="Hold to speak — or hold Space">
          <div class="mic-sweep" aria-hidden="true"></div>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </button>
        <div class="input-wrap">
          <input class="text-input" id="text-input" type="text"
            placeholder="or type a command..." autocomplete="off" spellcheck="false" />
        </div>
        <button class="send-btn" id="send-btn">SEND ↗</button>
        <button class="clear-btn" id="clear-btn" title="Clear conversation">⌀</button>
      </div>
    </div><!-- /bottom-bar -->

    <!-- Footer -->
    <footer class="ftr">
      <div class="ftr-item">LLM <span id="ftr-llm-addr">—</span><span class="ftr-dev" id="ftr-llm-dev">—</span></div>
      <div class="ftr-item">STT <span>Whisper (local)</span><span class="ftr-dev" id="ftr-whisper-dev">—</span></div>
      <div class="ftr-item">TTS <span id="ftr-tts">Kokoro (local)</span><span class="ftr-dev" id="ftr-kokoro-dev">—</span></div>
      <div class="ftr-item">SPACE <span>push-to-talk</span></div>
    </footer>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
