<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS — Local AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <h1>J.A.R.V.I.S.</h1>

      <button id="mic-btn">&#127908; Hold to Speak</button>
      <input type="text" id="text-input" placeholder="Or type a message..." />

    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
